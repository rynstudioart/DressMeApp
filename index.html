 </head>
 <body data-template-id="__page-root" class="w-full min-h-screen">

     <select id="cat-filter" class="border rounded px-3 py-2 text-sm" onchange="renderWardrobe()"> <option value="all">All</option> <option value="tops">Tops</option> <option value="bottoms">Bottoms</option> <option value="dress">Dress</option> <option value="skirt">Skirt</option> <option value="short pants">Short Pants</option> <option value="shoes">Shoes</option> <option value="accessories">Accessories</option> <option value="outerwear">Outerwear</option> </select> <button onclick="toggleAddForm()" class="ml-auto bg-gray-900 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-1"><i data-lucide="plus" style="width:16px;height:16px"></i> Add Item</button>

     <button onclick="startOutfitCreation()" class="ml-auto bg-gray-900 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-1"><i data-lucide="plus" style="width:16px;height:16px"></i> New Outfit</button>

     <label for="outfit-name" class="text-sm font-medium">Outfit Name</label> <input id="outfit-name" type="text" readonly required class="w-full border rounded-lg px-3 py-2 text-sm bg-white" placeholder="Select items to generate a name">
     <p class="text-xs text-gray-500">Tap items below to select:</p>
     <div id="outfit-picker" class="grid grid-cols-3 sm:grid-cols-4 gap-2 max-h-60 overflow-y-auto"></div>
     <div class="flex gap-2">
      <button onclick="saveOutfit()" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm">Save Outfit</button> <button onclick="cancelOutfit()" class="px-4 py-2 rounded-lg text-sm border">Cancel</button>

  <script src="/_sdk/c939c145c3c74230.editing_sdk.js" integrity="sha512-jh2pv/gl9Gzzn5dxfzwQO4wkqtnAQIim+LIUDYfVu2cdqPkQV2MqbjsDUW5IYbrSZFjRlOBrIWzlvWDXQYxOjg=="></script>
  <script src="/_sdk/935a53bc2e11fb8d.data_sdk.js" integrity="sha512-qr2oyPnEys1WebcOABaRh6hG77r5PWpqeWW6JTKbRJqly/INsfBi31CVNlTmHqjgeLpkVmmHZJUdxSx/32tOFQ=="></script>
  <script>
        let allData = [];
        let selectedIds = new Set();
        let creatingOutfit = false;


let db;

const request = indexedDB.open("DressMeDB", 1);

request.onupgradeneeded = function(event) {

    db = event.target.result;

    if (!db.objectStoreNames.contains("wardrobe")) {
        db.createObjectStore("wardrobe", {
            keyPath: "id"
        });
    }

    if (!db.objectStoreNames.contains("outfits")) {
        db.createObjectStore("outfits", {
            keyPath: "id"
        });
    }

};

request.onsuccess = function(event) {

    db = event.target.result;

    loadLocalData();

};

request.onerror = function() {

    console.error("IndexedDB error");

};

   function saveWardrobeItem(item) {

    const transaction =
        db.transaction(
            ["wardrobe"],
            "readwrite"
        );

    const store =
        transaction.objectStore(
            "wardrobe"
        );

    store.put(item);

}
   function getWardrobeItems() {

    return new Promise((resolve) => {

        const transaction =
            db.transaction(
                ["wardrobe"],
                "readonly"
            );

        const store =
            transaction.objectStore(
                "wardrobe"
            );

        const request =
            store.getAll();

        request.onsuccess =
            function() {

                resolve(
                    request.result
                );

            };

    });

}
   
        const handler = {
            onDataChanged(data) {
                allData = data;
                renderWardrobe();
                renderOutfits();
            }
        };

        (async () => {
            const r = await window.dataSdk.init(handler);
            if (!r.isOk) console.error('SDK init failed');
            lucide.createIcons();
        })();

        function items() {

  const wardrobeItems = allData.filter(
    d => d.type === "item"
  );

  const defaultDress = {
    __backendId: "default-dress-1",
    type: "item",
    name: "Dress 1",
    category: "dress",
    image_url: "dress1.PNG",
    outfit_items: ""
  };

  return [
    defaultDress,
    ...wardrobeItems
  ];

}

  
        function outfits() { return allData.filter(d => d.type === 'outfit'); }

        function switchTab(tab) {
            document.getElementById('view-wardrobe').classList.toggle('hidden', tab !== 'wardrobe');
            document.getElementById('view-outfits').classList.toggle('hidden', tab !== 'outfits');
            document.getElementById('tab-wardrobe').classList.toggle('tab-active', tab === 'wardrobe');
            document.getElementById('tab-outfits').classList.toggle('tab-active', tab === 'outfits');
        }

        function toggleAddForm() {
            document.getElementById('add-form').classList.toggle('hidden');
        }

        async function addItem(e) {

    e.preventDefault();

    const name =
        document
        .getElementById("item-name")
        .value
        .trim();

    const category =
        document
        .getElementById("item-cat")
        .value;

    const files =
        document
        .getElementById("item-files")
        .files;

    if (
        !name ||
        files.length === 0
    ) {
        return;
    }

    for (
        const file of files
    ) {

        const id =
            crypto.randomUUID();

        const reader =
            new FileReader();

        reader.onload =
            function(event) {

                const item = {

                    id: id,

                    __backendId: id,

                    type: "item",

                    name:
    file.name
        .replace(/\.[^/.]+$/, "")
        .toLowerCase() ,

                    category: category,

                    image_url:
                        event.target.result

                };

                saveWardrobeItem(item);

                allData.push(item);

                renderWardrobe();

            };

        reader.readAsDataURL(file);

    }

    e.target.reset();

    toggleAddForm();

}

        async function deleteRecord(rec) {
            await window.dataSdk.delete(rec);
        }

        function renderWardrobe() {
            const filter = document.getElementById('cat-filter').value;

    const list = filter === 'all'

        ? items()

        : items().filter(i => i.category === filter);
            const grid = document.getElementById('wardrobe-grid');
            const empty = document.getElementById('wardrobe-empty');
            empty.classList.toggle('hidden', list.length > 0);

            grid.innerHTML = '';
            list.forEach(item => {
                const div = document.createElement('div');
                div.className = 'relative rounded-xl overflow-hidden bg-white border group';
                div.innerHTML = `
                    <img src="${item.image_url}" alt="${item.name}" class="w-full aspect-square object-contain">
                    <div class="p-2">
                        <p class="text-xs font-medium truncate">${item.name}</p>
                        <p class="text-[10px] text-gray-400 uppercase">${item.category}</p>
                        <p class="text-[10px] text-gray-500 truncate">${item.category === 'dress' ? 'dress1.PNG' : ''}</p>
                    </div>
                    <button onclick="deleteRecord(allData.find(d=>d.__backendId==='${item.__backendId}'))" class="absolute top-1 right-1 bg-white/80 rounded-full p-1 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2" style="width:14px;height:14px;color:#ef4444"></i></button>
                `;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        function startOutfitCreation() {
            creatingOutfit = true;
            selectedIds.clear();
            updateOutfitName();
            document.getElementById('outfit-creator').classList.remove('hidden');
            renderPicker();
        }
        function cancelOutfit() {
            creatingOutfit = false;
            document.getElementById('outfit-creator').classList.add('hidden');
        }

        function updateOutfitName() {
            const name = [...selectedIds].map(id => items().find(item => item.__backendId === id)?.name).filter(Boolean).join('');
            document.getElementById('outfit-name').value = name;
        }

        function renderPicker() {

    const picker =
        document.getElementById('outfit-picker');

    picker.innerHTML = '';

    items().forEach(item => {

        const d =
            document.createElement('div');

        const sel =
            selectedIds.has(
                item.__backendId
            );

        d.className =
            `cursor-pointer rounded-lg overflow-hidden border-2 ${
                sel
                    ? 'border-amber-500'
                    : 'border-transparent'
            }`;

        d.innerHTML = `
            <img
                src="${item.image_url}"
                alt="${item.name}"
                class="w-full aspect-square object-cover">
        `;

        d.onclick = () => {

            if (
                selectedIds.has(
                    item.__backendId
                )
            ) {

                selectedIds.delete(
                    item.__backendId
                );

            } else {

                selectedIds.add(
                    item.__backendId
                );

            }

            updateOutfitName();

            renderPicker();

            updateGenerateButton();

        };

        picker.appendChild(d);

    });

    updateGenerateButton();

}

   function updateGenerateButton() {

    const button =
        document.getElementById("generate-button");

    if (selectedIds.size > 0) {

        button.classList.remove("hidden");

    } else {

        button.classList.add("hidden");

    }

}

        async function saveOutfit() {
            const name = document.getElementById('outfit-name').value.trim();
            if (!name || selectedIds.size === 0) return;
            await window.dataSdk.create({ type: 'outfit', name, category: '', image_url: '', outfit_items: [...selectedIds].join(',') });
            document.getElementById('outfit-name').value = '';
            cancelOutfit();
        }
   function generateOutfit() {

    const selectedItems =
        [...selectedIds]
            .map(id =>
                items().find(
                    item =>
                        item.__backendId === id
                )
            )
            .filter(Boolean);


    if (selectedItems.length === 0) {
        return;
    }


    // Get selected file names
    const selectedImages =
        selectedItems.map(
            item =>
                item.image_url
                    .split("/")
                    .pop()
                    .toLowerCase()
        );


    let generatedImage = "";


    // DRESS 1 + BAG 1
    if (
        selectedImages.includes("dress1.png") &&
        selectedImages.includes("bag1.png")
    ) {

        generatedImage =
            "./outfit2.jpg";

    }


    // ONLY DRESS 1
    else if (
        selectedImages.includes("dress1.png")
    ) {

        generatedImage =
            "./dress1.jpg";

    }


    // Show generated image
    document
        .getElementById("generated-image")
        .src = generatedImage;


    // Show outfit name
    document
        .getElementById("generated-name")
        .textContent =
            selectedItems
                .map(item => item.name)
                .join(" + ");


    // Show generated outfit section
    document
        .getElementById("generated-outfit")
        .classList
        .remove("hidden");

}

        function renderOutfits() {
            const list = outfits();
            const grid = document.getElementById('outfits-grid');
            const empty = document.getElementById('outfits-empty');
            empty.classList.toggle('hidden', list.length > 0);
            grid.innerHTML = '';
            list.forEach(o => {
                const ids = o.outfit_items ? o.outfit_items.split(',') : [];
                const oItems = ids.map(id => allData.find(d => d.__backendId === id)).filter(Boolean);
                const div = document.createElement('div');
                div.className = 'bg-white border rounded-xl p-3 space-y-2 relative group';
                div.innerHTML = `
                    <p class="font-medium text-sm">${o.name}</p>
                    <div class="flex gap-1 flex-wrap">${oItems.map(i => `<div class="text-center"><img src="${i.image_url}" alt="${i.name}" class="w-12 h-12 rounded object-cover"><span class="block text-[10px] text-gray-500">${i.category === 'dress' ? 'dress1.jpg' : ''}</span></div>`).join('')}</div>
                    <button onclick="deleteRecord(allData.find(d=>d.__backendId==='${o.__backendId}'))" class="absolute top-2 right-2 bg-white/80 rounded-full p-1 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2" style="width:14px;height:14px;color:#ef4444"></i></button>
                `;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }
    </script>
